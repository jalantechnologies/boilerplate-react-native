version: 2
jobs:
  
  lint:
    docker:
    - image: circleci/node:10.14.1
    steps:
    - checkout
    - attach_workspace:
        at: /home/circleci/project
    - run:
        name: Code linting
        command: npm run lint
  test:
    docker:
    - image: circleci/node:10.14.1
    steps:
    - checkout
    - attach_workspace:
        at: /home/circleci/project
    - run:
        name: Unit tests
        command: npm run test
workflows:
  version: 2
  build_lint:
    jobs:
    - lint
    - test